<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkling</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (() => {
        try {
          const raw = localStorage.getItem("inkling-settings");
          const settings = raw ? JSON.parse(raw) : {};
          const theme = settings.theme ?? "system";
          const dark =
            theme === "dark" ||
            (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch {}
      })();
    </script>
    <style>
      :root {
        --color-surface: #fafaf9;
        --color-surface-secondary: #f5f3f0;
        --color-surface-tertiary: #ede8e3;
        --color-border: #d8d5d0;
        --color-text: #1b1b18;
        --color-text-secondary: #5a5a57;
        --color-text-muted: #8b8b87;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-surface: #1a1a1a;
          --color-surface-secondary: #0f0f0f;
          --color-surface-tertiary: #2a2a2a;
          --color-border: #323232;
          --color-text: #ececec;
          --color-text-secondary: #aaa;
          --color-text-muted: #666;
        }
      }
      .dark {
        --color-surface: #1a1a1a;
        --color-surface-secondary: #0f0f0f;
        --color-surface-tertiary: #2a2a2a;
        --color-border: #323232;
        --color-text: #ececec;
        --color-text-secondary: #aaa;
        --color-text-muted: #666;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--color-surface);
        color: var(--color-text);
        overflow: hidden;
      }
      .initial-shell {
        display: flex;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--color-surface);
        color: var(--color-text);
      }
      .initial-shell__sidebar {
        box-sizing: border-box;
        display: flex;
        width: 14rem;
        flex-direction: column;
        border-right: 1px solid var(--color-border);
        background: var(--color-surface-secondary);
      }
      .initial-shell__main {
        box-sizing: border-box;
        display: flex;
        flex: 1;
        justify-content: center;
        overflow-y: auto;
        background: var(--color-surface);
      }
      .initial-shell__sidebar-header,
      .initial-shell__button-group,
      .initial-shell__sidebar-footer,
      .initial-shell__row,
      .initial-shell__stats {
        display: flex;
        align-items: center;
      }
      .initial-shell__sidebar-header,
      .initial-shell__sidebar-footer,
      .initial-shell__stats {
        justify-content: space-between;
      }
      .initial-shell__sidebar-header {
        height: 3.0625rem;
        border-bottom: 1px solid var(--color-border);
        padding: 0.5rem 0.75rem;
      }
      .initial-shell__button-group {
        gap: 0.125rem;
        border-radius: 0.375rem;
        background: var(--color-surface);
        padding: 0.125rem;
      }
      .initial-shell__icon-button,
      .initial-shell__small-button {
        display: grid;
        place-items: center;
        border-radius: 0.375rem;
        color: var(--color-text-muted);
        font-size: 0.8125rem;
      }
      .initial-shell__icon-button {
        width: 2rem;
        height: 2rem;
      }
      .initial-shell__small-button {
        width: 1.75rem;
        height: 1.75rem;
      }
      .initial-shell__list {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 0.25rem;
        overflow: hidden;
        padding: 0.25rem 0.375rem;
      }
      .initial-shell__card {
        margin: 0.25rem;
        border: 1px solid var(--color-border);
        border-radius: 0.5rem;
        background: color-mix(in srgb, var(--color-surface), transparent 40%);
        padding: 0.25rem;
      }
      .initial-shell__card--compact,
      .initial-shell__row {
        display: flex;
        min-height: 1.75rem;
        align-items: center;
        gap: 0.5rem;
        border-radius: 0.375rem;
        padding: 0.375rem 0.5rem;
      }
      .initial-shell__date {
        margin-left: auto;
        color: var(--color-text-muted);
        font-size: 0.6875rem;
      }
      .initial-shell__label,
      .initial-shell__line,
      .initial-shell__footer-line,
      .initial-shell__stat-pill,
      .initial-shell__body-line,
      .initial-shell__pill {
        border-radius: 999px;
        background: var(--color-surface-tertiary);
      }
      .initial-shell__label {
        width: 7rem;
        height: 0.625rem;
      }
      .initial-shell__label--tiny {
        width: 3.5rem;
        height: 0.5rem;
        margin: 0.375rem 0.5rem 0.25rem;
      }
      .initial-shell__label--short {
        width: 4.5rem;
      }
      .initial-shell__label--mid {
        width: 5.75rem;
      }
      .initial-shell__line {
        width: 78%;
        height: 0.6875rem;
        margin: 0.75rem 0.875rem 0.25rem;
      }
      .initial-shell__line--short {
        width: 58%;
        margin-top: 0.875rem;
      }
      .initial-shell__sidebar-footer {
        gap: 0.125rem;
        border-top: 1px solid var(--color-border);
        padding: 0.5rem 0.75rem;
      }
      .initial-shell__footer-line {
        flex: 1;
        max-width: 7rem;
        height: 0.625rem;
        margin-right: auto;
      }
      .initial-shell__page {
        box-sizing: border-box;
        display: flex;
        width: min(42.5rem, 100%);
        min-height: 100%;
        flex-direction: column;
        padding: 4rem 1rem 8rem;
      }
      .initial-shell__search {
        border: 1px solid var(--color-border);
        border-radius: 0.5rem;
        background: var(--color-surface-secondary);
        padding: 0.625rem 2.25rem;
        color: var(--color-text-muted);
        font-size: 0.875rem;
      }
      .initial-shell__stats {
        justify-content: flex-start;
        gap: 0.5rem;
        margin: 2rem 0;
        color: var(--color-text-secondary);
        font-size: 0.75rem;
      }
      .initial-shell__stats span:first-child,
      .initial-shell__new-card {
        border-radius: 0.375rem;
        background: var(--color-surface-tertiary);
        padding: 0.25rem 0.625rem;
      }
      .initial-shell__stat-pill {
        width: 5rem;
        height: 1.375rem;
        border-radius: 0.375rem;
      }
      .initial-shell__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }
      .initial-shell__new-card,
      .initial-shell__note-card {
        min-height: 8.25rem;
        border: 1px dashed var(--color-border);
        border-radius: 0.5rem;
      }
      .initial-shell__new-card {
        display: grid;
        place-items: center;
        background: transparent;
        color: var(--color-text-muted);
        font-size: 0.75rem;
        font-weight: 500;
      }
      .initial-shell__note-card {
        border-style: solid;
        background: color-mix(in srgb, var(--color-surface-secondary), transparent 55%);
        padding: 1rem;
      }
      .initial-shell__label--card {
        width: 62%;
        height: 0.8125rem;
        margin-bottom: 1rem;
      }
      .initial-shell__body-line {
        width: 72%;
        height: 0.625rem;
        margin-bottom: 0.75rem;
      }
      .initial-shell__body-line--wide {
        width: 92%;
      }
      @media (max-width: 767px) {
        .initial-shell__sidebar {
          display: none;
        }
        .initial-shell__page {
          padding-top: 4rem;
        }
        .initial-shell__grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-shell" aria-label="Loading Inkling">
        <aside class="initial-shell__sidebar">
          <div class="initial-shell__sidebar-header">
            <div class="initial-shell__icon-button" aria-hidden="true">⌂</div>
            <div class="initial-shell__button-group">
              <div class="initial-shell__small-button" aria-hidden="true">+</div>
              <div class="initial-shell__small-button" aria-hidden="true">‹</div>
            </div>
          </div>
          <div class="initial-shell__list">
            <div class="initial-shell__card">
              <div class="initial-shell__label initial-shell__label--tiny"></div>
              <div class="initial-shell__row">
                <div class="initial-shell__label initial-shell__label--short"></div>
                <span class="initial-shell__date">Today</span>
              </div>
              <div class="initial-shell__row">
                <div class="initial-shell__label initial-shell__label--mid"></div>
                <span class="initial-shell__date">Yesterday</span>
              </div>
            </div>
            <div class="initial-shell__card initial-shell__card--compact">
              <div class="initial-shell__label initial-shell__label--mid"></div>
              <span class="initial-shell__date">⌘⇧X</span>
            </div>
            <div class="initial-shell__line"></div>
            <div class="initial-shell__line initial-shell__line--short"></div>
          </div>
          <div class="initial-shell__sidebar-footer">
            <div class="initial-shell__footer-line"></div>
            <div class="initial-shell__small-button"></div>
            <div class="initial-shell__small-button"></div>
          </div>
        </aside>
        <main class="initial-shell__main">
          <section class="initial-shell__page">
            <div class="initial-shell__search">Search notes...</div>
            <div class="initial-shell__stats">
              <span>Loading notes</span>
              <span class="initial-shell__stat-pill"></span>
            </div>
            <div class="initial-shell__grid">
              <div class="initial-shell__new-card">New Note</div>
              <div class="initial-shell__note-card">
                <div class="initial-shell__label initial-shell__label--card"></div>
                <div class="initial-shell__body-line"></div>
                <div class="initial-shell__body-line initial-shell__body-line--wide"></div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
