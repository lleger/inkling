<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkling</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (() => {
        try {
          const raw = localStorage.getItem("inkling-settings");
          const settings = raw ? JSON.parse(raw) : {};
          const theme = settings.theme ?? "system";
          const dark =
            theme === "dark" ||
            (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch {}
      })();
    </script>
    <style>
      :root {
        --color-surface: #fafaf9;
        --color-surface-secondary: #f5f3f0;
        --color-surface-tertiary: #ede8e3;
        --color-border: #d8d5d0;
        --color-text: #1b1b18;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-surface: #1a1a1a;
          --color-surface-secondary: #0f0f0f;
          --color-surface-tertiary: #2a2a2a;
          --color-border: #323232;
          --color-text: #ececec;
        }
      }
      .dark {
        --color-surface: #1a1a1a;
        --color-surface-secondary: #0f0f0f;
        --color-surface-tertiary: #2a2a2a;
        --color-border: #323232;
        --color-text: #ececec;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--color-surface);
        color: var(--color-text);
        overflow: hidden;
      }
      .initial-shell {
        display: flex;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--color-surface);
        color: var(--color-text);
      }
      .initial-shell__sidebar {
        box-sizing: border-box;
        display: flex;
        width: 17rem;
        flex-direction: column;
        gap: 1rem;
        border-right: 1px solid var(--color-border);
        background: var(--color-surface-secondary);
        padding: 1rem;
      }
      .initial-shell__main {
        box-sizing: border-box;
        display: flex;
        flex: 1;
        flex-direction: column;
        background: var(--color-surface);
      }
      .initial-shell__brand,
      .initial-shell__toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .initial-shell__brand {
        justify-content: flex-start;
        gap: 0.625rem;
        font-size: 0.875rem;
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      .initial-shell__mark {
        display: grid;
        width: 1.75rem;
        height: 1.75rem;
        place-items: center;
        border-radius: 0.5rem;
        background: var(--color-surface-tertiary);
        color: var(--color-text);
        font-size: 0.75rem;
      }
      .initial-shell__new,
      .initial-shell__line,
      .initial-shell__title,
      .initial-shell__body-line,
      .initial-shell__pill {
        border-radius: 999px;
        background: var(--color-surface-tertiary);
      }
      .initial-shell__new {
        height: 2.25rem;
        margin-top: 0.5rem;
        padding: 0 0.875rem;
        color: var(--color-text);
        font-size: 0.8125rem;
        line-height: 2.25rem;
      }
      .initial-shell__group {
        display: flex;
        flex-direction: column;
        gap: 0.875rem;
        margin-top: 0.5rem;
      }
      .initial-shell__group--lower {
        margin-top: auto;
      }
      .initial-shell__line {
        width: 82%;
        height: 0.625rem;
      }
      .initial-shell__line--short {
        width: 48%;
      }
      .initial-shell__line--mid {
        width: 68%;
      }
      .initial-shell__toolbar {
        box-sizing: border-box;
        height: 3.5rem;
        border-bottom: 1px solid var(--color-border);
        padding: 0 1rem;
      }
      .initial-shell__pill {
        height: 1.75rem;
        padding: 0 0.875rem;
        color: var(--color-text);
        font-size: 0.8125rem;
        line-height: 1.75rem;
      }
      .initial-shell__page {
        box-sizing: border-box;
        width: min(42rem, calc(100% - 2rem));
        margin: 13vh auto 0;
      }
      .initial-shell__title {
        width: 58%;
        height: 2rem;
        margin-bottom: 2rem;
      }
      .initial-shell__body-line {
        width: 72%;
        height: 0.75rem;
        margin-bottom: 1rem;
      }
      .initial-shell__body-line--wide {
        width: 92%;
      }
      .initial-shell__body-line--narrow {
        width: 46%;
      }
      @media (max-width: 767px) {
        .initial-shell__sidebar {
          display: none;
        }
        .initial-shell__toolbar {
          height: 3rem;
        }
        .initial-shell__page {
          margin-top: 10vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-shell" aria-label="Loading Inkling">
        <aside class="initial-shell__sidebar">
          <div class="initial-shell__brand">
            <div class="initial-shell__mark">I</div>
            <span>Inkling</span>
          </div>
          <div class="initial-shell__new">New note</div>
          <div class="initial-shell__group">
            <div class="initial-shell__line"></div>
            <div class="initial-shell__line initial-shell__line--short"></div>
            <div class="initial-shell__line initial-shell__line--mid"></div>
          </div>
          <div class="initial-shell__group initial-shell__group--lower">
            <div class="initial-shell__line initial-shell__line--mid"></div>
            <div class="initial-shell__line initial-shell__line--short"></div>
          </div>
        </aside>
        <main class="initial-shell__main">
          <div class="initial-shell__toolbar">
            <div class="initial-shell__pill">Loading workspace</div>
          </div>
          <section class="initial-shell__page">
            <div class="initial-shell__title"></div>
            <div class="initial-shell__body-line"></div>
            <div class="initial-shell__body-line initial-shell__body-line--wide"></div>
            <div class="initial-shell__body-line initial-shell__body-line--narrow"></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
